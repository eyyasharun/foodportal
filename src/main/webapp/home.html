<!DOCTYPE html>
<html>
<head>
    <title>online shopinning Easy</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f5f5f5;
        }

        header {
            background: #ff6f61;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background: #333;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }

        .product {
            background: white;
            margin: 15px;
            padding: 15px;
            width: 220px;
            border-radius: 8px;
            box-shadow: 0 0 5px gray;
            text-align: center;
        }

        .product img {
            width: 100%;
            height: 150px;
        }

        button {
            background: #ff6f61;
            color: white;
            border: none;
            padding: 10px;
            margin-top: 10px;
            cursor: pointer;
        }

        button:hover {
            background: #e85c50;
        }

        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>

<body>

<header>
    <h1>ShopEasy</h1>
    <p>Best Online Shopping</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">Cart</a>
    <a href="#">Contact</a>
</nav>

<div class="container">

    <div class="product">
        <img src="https://via.placeholder.com/200">
        <h3>Smartphone</h3>
        <p>₹15,000</p>
        <button onclick="addToCart('Smartphone')">Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/200">
        <h3>Laptop</h3>
        <p>₹55,000</p>
        <button onclick="addToCart('Laptop')">Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/200">
        <h3>Headphones</h3>
        <p>₹2,000</p>
        <button onclick="addToCart('Headphones')">Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/200">
        <h3>Watch</h3>
        <p>₹3,500</p>
        <button onclick="addToCart('Watch')">Add to Cart</button>
    </div>

</div>

<footer>
    <p>© 2026 ShopEasy</p>
</footer>

<script>
    function addToCart(product) {
        alert(product + " added to cart!");
    }
</script>

</body>
</html>
